<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Quiñonez - Portafolio</title>
    
    <!-- Google Fonts para tipografía elegante -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 25%, #e8eaf6 50%, #e0f2f1 75%, #f9fbe7 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Animación del gradiente de fondo */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Partículas decorativas flotantes */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 8s infinite ease-in-out;
        }

        .particle:nth-child(1) {
            width: 60px;
            height: 60px;
            background: #f8bbd0;
            left: 10%;
            top: 20%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 40px;
            height: 40px;
            background: #b3e5fc;
            left: 80%;
            top: 15%;
            animation-delay: 1s;
        }

        .particle:nth-child(3) {
            width: 50px;
            height: 50px;
            background: #c8e6c9;
            left: 70%;
            top: 70%;
            animation-delay: 2s;
        }

        .particle:nth-child(4) {
            width: 35px;
            height: 35px;
            background: #ffe082;
            left: 20%;
            top: 75%;
            animation-delay: 3s;
        }

        .particle:nth-child(5) {
            width: 45px;
            height: 45px;
            background: #d1c4e9;
            left: 50%;
            top: 50%;
            animation-delay: 4s;
        }

        .particle:nth-child(6) {
            width: 30px;
            height: 30px;
            background: #ffccbc;
            left: 85%;
            top: 40%;
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0) scale(1);
            }
            25% {
                transform: translateY(-30px) translateX(20px) scale(1.1);
            }
            50% {
                transform: translateY(-15px) translateX(-10px) scale(0.9);
            }
            75% {
                transform: translateY(-40px) translateX(-15px) scale(1.2);
            }
        }

        /* Contenedor principal */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 80px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.5);
            text-align: center;
            animation: fadeInUp 1s ease-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 25px 70px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.6);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Icono decorativo */
        .icon-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .icon-badge {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: pulse 2s infinite;
        }

        .icon-badge:nth-child(1) {
            background: linear-gradient(135deg, #f8bbd0, #f48fb1);
            animation-delay: 0s;
        }

        .icon-badge:nth-child(2) {
            background: linear-gradient(135deg, #b3e5fc, #81d4fa);
            animation-delay: 0.3s;
        }

        .icon-badge:nth-child(3) {
            background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
            animation-delay: 0.6s;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        /* Título principal con efecto gradiente pastel */
        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(
                90deg,
                #f8bbd0 0%,
                #ce93d8 20%,
                #90caf9 40%,
                #a5d6a7 60%,
                #fff176 80%,
                #ffccbc 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientText 5s linear infinite;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }

        @keyframes gradientText {
            to {
                background-position: 200% center;
            }
        }

        /* Subtítulo con color pastel rosa */
        .subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            color: #ce93d8;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Línea decorativa */
        .divider {
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #f8bbd0, #90caf9, #a5d6a7);
            margin: 0 auto 30px;
            border-radius: 2px;
            animation: expandLine 2s ease-in-out infinite;
        }

        @keyframes expandLine {
            0%, 100% { width: 100px; }
            50% { width: 150px; }
        }

        /* Descripción con letras de colores pastel */
        .description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #78909c;
            margin-bottom: 35px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .highlight {
            font-weight: 600;
            background: linear-gradient(135deg, #f8bbd0, #f48fb1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .highlight-blue {
            font-weight: 600;
            background: linear-gradient(135deg, #b3e5fc, #81d4fa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .highlight-green {
            font-weight: 600;
            background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Botones con colores pastel */
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-pink {
            background: linear-gradient(135deg, #f8bbd0, #f48fb1);
        }

        .btn-blue {
            background: linear-gradient(135deg, #b3e5fc, #81d4fa);
        }

        .btn-green {
            background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
            color: #2e7d32;
        }

        /* Elementos decorativos adicionales */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: white;
            opacity: 0;
            animation: sparkle 2s infinite;
        }

        .sparkle:nth-child(1) {
            top: 10%;
            left: 20%;
            animation-delay: 0s;
        }

        .sparkle:nth-child(2) {
            top: 80%;
            left: 75%;
            animation-delay: 0.5s;
        }

        .sparkle:nth-child(3) {
            top: 40%;
            left: 85%;
            animation-delay: 1s;
        }

        .sparkle:nth-child(4) {
            top: 60%;
            left: 15%;
            animation-delay: 1.5s;
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.5);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 40px 30px;
                margin: 20px;
            }

            .title {
                font-size: 3.5rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .btn {
                padding: 12px 25px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 2.5rem;
            }

            .button-group {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de fondo -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Destellos decorativos -->
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <!-- Contenedor principal -->
    <main class="container">
        <!-- Iconos flotantes -->
        <div class="icon-container">
            <div class="icon-badge">
                <i class="fas fa-star" style="color: white;"></i>
            </div>
            <div class="icon-badge">
                <i class="fas fa-heart" style="color: white;"></i>
            </div>
            <div class="icon-badge">
                <i class="fas fa-smile" style="color: white;"></i>
            </div>
        </div>

        <!-- Nombre principal -->
        <h1 class="title">Geo Quiñonez</h1>
        
        <!-- Subtítulo -->
        <p class="subtitle">✦ Creative Developer ✦</p>
        
        <!-- Línea decorativa -->
        <div class="divider"></div>
        
        <!-- Descripción con palabras destacadas en diferentes tonos pastel -->
        <p class="description">
            Bienvenidos al portafolio de 
            <span class="highlight">Geo Quiñonez</span>, 
            donde la 
            <span class="highlight-blue">creatividad</span> 
            y la 
            <span class="highlight-green">innovación</span> 
            se unen para crear experiencias 
            <span class="highlight">únicas</span> 
            y 
            <span class="highlight-blue">memorables</span>.
        </p>

        <!-- Botones de acción con colores pastel -->
        <div class="button-group">
            <a href="#" class="btn btn-pink">
                <i class="fas fa-folder-open"></i> Proyectos
            </a>
            <a href="#" class="btn btn-blue">
                <i class="fas fa-envelope"></i> Contacto
            </a>
            <a href="#" class="btn btn-green">
                <i class="fas fa-user"></i> Sobre Mí
            </a>
        </div>
    </main>
</body>
</html>
